version: '3.9'

services:
  # ─── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: revendahub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-revendahub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-revendahub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (NestJS) ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: revendahub-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-revendahub}
      JWT_SECRET: ${JWT_SECRET:-MUDE_ESTA_CHAVE_JWT_EM_PRODUCAO}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-MUDE_ESTA_CHAVE_32_CHARS_______}
      API_PORT: 3333
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "3333:3333"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3333/api/auth/me || true"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Frontend (React + Nginx) ───────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: revendahub-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  postgres_data:
    driver: local

networks:
  app-network:
    driver: bridge
